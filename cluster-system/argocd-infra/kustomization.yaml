apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Force all resources to deploy into the argocd namespace
namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

# Bake your custom NodePort configuration directly into the deployment
patches:
  - patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: argocd-server
      spec:
        type: NodePort
        ports:
          - name: https
            port: 443
            targetPort: https
            nodePort: 32443